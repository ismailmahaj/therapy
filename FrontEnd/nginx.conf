# Configuration Nginx pour SPA React Router
# Placez ce fichier dans /etc/nginx/sites-available/ ou incluez-le dans votre config

server {
    listen 80;
    server_name votre-domaine.com;
    root /var/www/html/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Cache pour les assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Toutes les routes redirigent vers index.html pour le routing côté client
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sécurité - Empêcher l'accès aux fichiers cachés
    location ~ /\. {
        deny all;
    }
}
